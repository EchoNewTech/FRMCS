<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>FRMCS Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
    <h1 class="text-3xl font-bold text-center text-blue-500 mb-10">System Sterowania FRMCS</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
        <script>
            const trains = [
                {id: 'express', name: 'Express (9C:9A)'},
                {id: 'cargo', name: 'Cargo (9C:9A)'}
            ];
            
            async function control(id, action, param='') {
                const res = await fetch(`/api/${action}/${id}${param ? '/'+param : ''}`, {method: 'POST'});
                
                if (res.status === 412) {
                    alert("⚠️ Akcja niemożliwa: Najpierw musisz połączyć się z pociągiem!");
                    return;
                }

                const data = await res.json();
                
                if(action === 'move' || action === 'stop') {
                    document.getElementById(`speed-${id}`).innerText = data.speed + '%';
                }
                if(action === 'connect') {
                    if(data.status === 'success') {
                        document.getElementById(`status-${id}`).innerText = 'POŁĄCZONO';
                        document.getElementById(`status-${id}`).className = 'text-xs font-bold text-green-500';
                    } else {
                        alert('Nie znaleziono pociągu. Upewnij się, że jest włączony.');
                    }
                }
            }

            document.write(trains.map(t => `
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">${t.name}</h2>
                        <span id="status-${t.id}" class="text-xs font-bold text-red-500">ROZŁĄCZONY</span>
                    </div>
                    
                    <button onclick="control('${t.id}', 'connect')" class="w-full bg-blue-600 py-2 rounded mb-4 hover:bg-blue-500 transition">POŁĄCZ</button>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <button onclick="control('${t.id}', 'move', 'up')" class="bg-green-600 py-4 rounded font-bold hover:bg-green-500">PRZYSPIESZ (+)</button>
                        <button onclick="control('${t.id}', 'move', 'down')" class="bg-yellow-600 py-4 rounded font-bold hover:bg-yellow-500">ZWOLNIJ (-)</button>
                    </div>
                    
                    <button onclick="control('${t.id}', 'stop')" class="w-full bg-red-600 py-3 rounded font-bold mb-4 hover:bg-red-500">STOP</button>
                    
                    <div class="text-center bg-black p-2 rounded">
                        <span class="text-gray-400">Prędkość:</span>
                        <span id="speed-${t.id}" class="text-2xl font-mono text-green-400 ml-2">0%</span>
                    </div>
                </div>
            `).join(''));
        </script>
    </div>
</body>
</html>
