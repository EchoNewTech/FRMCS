<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>FRMCS Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-10 flex flex-col items-center">
    <h1 class="text-3xl font-bold text-center text-blue-500 mb-10 w-full max-w-6xl">System Sterowania FRMCS</h1>

    <div class="w-full max-w-6xl">
        <div id="trains-container" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>

        <div class="mt-8 bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
            <h3 class="text-gray-400 text-sm font-bold mb-4 uppercase tracking-widest text-center">Blokada Liniowa
                (Strefy)</h3>
            <div id="zones-container" class="flex flex-col md:flex-row gap-4">
                <p class="text-center w-full text-gray-500 animate-pulse">Ładowanie makiety...</p>
            </div>
        </div>

        <div class="mt-8 bg-gray-950 p-4 rounded-xl border border-gray-700 shadow-inner">
            <h3 class="text-gray-500 text-xs font-bold mb-3 uppercase tracking-widest flex items-center">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse mr-2"></span> Dziennik Dyspozytora
            </h3>
            <ul id="system-logs" class="text-sm font-mono text-blue-300 space-y-1 h-32 overflow-y-auto pl-2"></ul>
        </div>
    </div>

    <script>
        let sysConfig = null;

        // Mapowanie kolorów logicznych na klasy Tailwind
        const twColors = {
            blue: { text: 'text-blue-500', bg: 'bg-blue-600', hover: 'hover:bg-blue-500', border: 'border-blue-600/30', zoneBg: 'bg-blue-900/10' },
            green: { text: 'text-green-500', bg: 'bg-green-600', hover: 'hover:bg-green-500', border: 'border-green-600/30', zoneBg: 'bg-green-900/10' },
            yellow: { text: 'text-yellow-500', bg: 'bg-yellow-600', hover: 'hover:bg-yellow-500', border: 'border-yellow-600/30', zoneBg: 'bg-yellow-900/10' },
            slate: { text: 'text-slate-300', bg: 'bg-slate-600', hover: 'hover:bg-slate-500', border: 'border-slate-500/30', zoneBg: 'bg-slate-800/50' },
            red: { text: 'text-red-500', bg: 'bg-red-600', hover: 'hover:bg-red-500' },
            orange: { text: 'text-orange-500', bg: 'bg-orange-600', hover: 'hover:bg-orange-500' },
            gray: { text: 'text-gray-500', bg: 'bg-gray-600', hover: 'hover:bg-gray-500' }
        };

        // Główna funkcja startowa (Pobiera config.py)
        async function initSystem() {
            try {
                const res = await fetch('/api/config');
                sysConfig = await res.json();

                renderTrains();
                renderZones();
                setInterval(updateStatus, 500);
            } catch (e) {
                console.error("Czekam na uruchomienie serwera Python...", e);
                setTimeout(initSystem, 2000);
            }
        }

        function renderZones() {
            const container = document.getElementById('zones-container');
            const zones = Object.values(sysConfig.colors)
                .filter(c => c.role === 'zone')
                .sort((a, b) => a.zone_id - b.zone_id); // Sortujemy Strefa 1, 2, 3, 4...

            container.innerHTML = zones.map(c => {
                const th = twColors[c.ui_color] || twColors.gray;
                return `
                <div id="ui-zone-${c.zone_id}" class="flex-1 border-2 ${th.border} ${th.zoneBg} rounded-lg p-4 text-center transition-all duration-300">
                    <div class="${th.text} font-bold mb-2">STREFA ${c.zone_id} <span class="text-xs opacity-60">(${c.label})</span></div>
                    <div id="occupant-${c.zone_id}" class="text-gray-500 text-sm font-mono bg-black/30 py-2 rounded">WOLNA</div>
                </div>`;
            }).join('');
        }

        function renderTrains() {
            const container = document.getElementById('trains-container');
            const sortedColors = Object.entries(sysConfig.colors).sort((a, b) => {
                const orderA = a[1].order !== undefined ? a[1].order : 99;
                const orderB = b[1].order !== undefined ? b[1].order : 99;
                return orderA - orderB;
            });

            const devButtonsHtml = sortedColors.map(([code, c]) => {
                const th = twColors[c.ui_color] || twColors.gray;
                const label = c.role === 'zone' ? `Z${c.zone_id}` : c.label.substring(0, 4);
                return `<button onclick="control('{TID}', 'simulate', '${code}')" class="flex-1 ${th.bg} ${th.hover} h-8 rounded text-xs font-bold shadow text-white" title="${c.label}">${label}</button>`;
            }).join('');

            container.innerHTML = Object.entries(sysConfig.trains).map(([id, t]) => {
                // Automatyczne wycinanie 5 ostatnich znaków z MAC
                const macSuffix = t.mac ? t.mac.slice(-5) : "Brak MAC";
                return `
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">${t.name} (${macSuffix})</h2>
                        <span id="status-${id}" class="text-xs font-bold text-red-500">ROZŁĄCZONY</span>
                    </div>
                    
                    <div class="flex gap-2 mb-4">
                        <button onclick="control('${id}', 'connect')" class="flex-1 bg-blue-600 py-2 rounded text-sm font-bold hover:bg-blue-500 transition shadow">POŁĄCZ</button>
                        <button onclick="control('${id}', 'disconnect')" class="flex-1 bg-gray-700 border border-gray-600 py-2 rounded text-sm font-bold text-gray-300 hover:bg-red-600 hover:text-white transition shadow">ROZŁĄCZ</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <button onclick="control('${id}', 'move', 'up')" class="bg-green-600 py-4 rounded font-bold hover:bg-green-500 transition shadow">PRZYSPIESZ (+)</button>
                        <button onclick="control('${id}', 'move', 'down')" class="bg-yellow-600 py-4 rounded font-bold hover:bg-yellow-500 transition shadow">ZWOLNIJ (-)</button>
                    </div>
                    
                    <button onclick="control('${id}', 'stop')" class="w-full bg-red-600 py-3 rounded font-bold mb-4 hover:bg-red-500 transition shadow">STOP</button>
                    
                    <div class="text-center bg-black p-3 rounded mb-2">
                        <span class="text-gray-400 uppercase text-xs tracking-widest">Prędkość</span>
                        <span id="speed-${id}" class="text-3xl font-mono text-green-400 block mt-1">0%</span>
                    </div>

                    <div class="flex justify-between items-center bg-gray-900 border border-gray-700 p-3 rounded mt-2">
                        <div>
                            <span class="text-gray-400 text-sm block">Skaner toru:</span>
                            <div class="text-[11px] font-mono mt-1 flex gap-3">
                                <span class="text-red-500">R: <span id="r-${id}">0</span></span>
                                <span class="text-green-500">G: <span id="g-${id}">0</span></span>
                                <span class="text-blue-500">B: <span id="b-${id}">0</span></span>
                            </div>
                        </div>
                        <span id="color-${id}" class="font-bold text-gray-500 tracking-wider">CZEKAM...</span>
                    </div>
                    
                    <div id="dev-tools-${id}" class="mt-4 border-t border-gray-700 pt-3 hidden">
                        <span class="text-xs text-gray-500 uppercase tracking-widest block mb-2">Symulacja Czujnika (DEV)</span>
                        <div class="flex space-x-2">
                            ${devButtonsHtml.replace(/{TID}/g, id)}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        async function control(id, action, param = '') {
            const res = await fetch(`/api/${action}/${id}${param ? '/' + param : ''}`, { method: 'POST' });
            if (res.status === 412) {
                alert("⚠️ Akcja niemożliwa: Najpierw połącz się z pociągiem!");
            }
        }

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                if (!res.ok) return;
                const data = await res.json();

                // Logi
                if (data.logs.length > 0) {
                    document.getElementById('system-logs').innerHTML = data.logs.map(l => `<li>> ${l}</li>`).join('');
                }

                // Pociągi
                for (const [id, tData] of Object.entries(data.trains)) {
                    document.getElementById(`speed-${id}`).innerText = tData.speed + '%';

                    if (tData.rgb) {
                        document.getElementById(`r-${id}`).innerText = tData.rgb.r;
                        document.getElementById(`g-${id}`).innerText = tData.rgb.g;
                        document.getElementById(`b-${id}`).innerText = tData.rgb.b;
                    }

                    const colorEl = document.getElementById(`color-${id}`);
                    colorEl.innerText = tData.color_text;
                    const th = twColors[tData.ui_color] || twColors.gray;
                    colorEl.className = `font-bold tracking-wider ${th.text}`;

                    const statusEl = document.getElementById(`status-${id}`);
                    const devTools = document.getElementById(`dev-tools-${id}`);

                    if (tData.connection === 'bt') {
                        statusEl.innerText = 'POŁĄCZONO (BT)';
                        statusEl.className = 'text-xs font-bold text-green-500';
                        devTools.classList.add('hidden');
                    } else if (tData.connection === 'virtual') {
                        statusEl.innerText = 'WIRTUALNY (DEV)';
                        statusEl.className = 'text-xs font-bold text-yellow-500 animate-pulse';
                        devTools.classList.remove('hidden');
                    } else {
                        statusEl.innerText = 'ROZŁĄCZONY';
                        statusEl.className = 'text-xs font-bold text-red-500';
                        devTools.classList.add('hidden');
                    }
                }

                // Strefy
                for (const [z_id, occupant] of Object.entries(data.zones)) {
                    const zoneDiv = document.getElementById(`ui-zone-${z_id}`);
                    const occupantDiv = document.getElementById(`occupant-${z_id}`);
                    if (!zoneDiv) continue; // Ignoruj jeśli jeszcze nie wyrenderowano

                    if (occupant) {
                        occupantDiv.innerText = occupant;
                        occupantDiv.className = "text-white text-sm font-bold bg-red-600 py-2 rounded shadow-lg";
                        zoneDiv.classList.add("border-red-500", "bg-red-900/30");
                    } else {
                        occupantDiv.innerText = "WOLNA";
                        occupantDiv.className = "text-gray-500 text-sm font-mono bg-black/30 py-2 rounded";
                        zoneDiv.classList.remove("border-red-500", "bg-red-900/30");
                    }
                }
            } catch (e) { }
        }

        // Start!
        initSystem();
    </script>
</body>

</html>
